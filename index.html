<!--
  vBoD V2A - Open this file in a browser (when served by Vercel or vercel dev)

  Required environment variables (set in Vercel project settings or local env):
  - VBOD_PASSWORD: demo login password checked by /api/login
  - AUTH_SECRET: secret used to sign session tokens

  Local development with Vercel CLI:
  1) Install CLI: npm i -g vercel
  2) Set env vars locally: vercel env add VBOD_PASSWORD development
                             vercel env add AUTH_SECRET development
  3) Run: vercel dev
  4) Open the local URL shown by Vercel CLI

  Deploy to production:
  - vercel --prod
-->
